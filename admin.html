<!doctype html>
<html lang="he" dir="rtl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenieSite Admin | לוח בקרה</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        margin: 0;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      .sidebar {
        width: 340px;
        z-index: 10;
        flex-shrink: 0;
      }
      .sidebar-header {
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .icon-box {
        background: var(--primary);
        color: white;
        padding: 0.5rem;
        border-radius: 0.5rem;
        display: flex;
      }
      .client-list {
        flex: 1;
        overflow-y: auto;
        list-style: none;
      }

      .dashboard-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .topbar {
        height: 75px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2rem;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
      }
      .content-area {
        padding: 2rem;
        overflow-y: auto;
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
      }

      .data-panel {
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg-card);
        border-radius: var(--border-radius-lg);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-sm);
      }
      .panel-body {
        overflow-y: auto;
        padding: 2rem;
      }

      /* עיצוב הלשוניות */
      .ai-tabs-container {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
        background: var(--bg-card);
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        flex-wrap: nowrap;
        flex-shrink: 0;
      }
      .ai-tab-btn {
        padding: 0.6rem 1.25rem;
        background: var(--bg-body);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-md);
        color: var(--text-muted);
        cursor: pointer;
        font-weight: 500;
        white-space: nowrap;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .ai-tab-btn:hover {
        background: var(--border-color);
        color: var(--text-main);
      }
      .ai-tab-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        box-shadow: var(--shadow-sm);
      }

      /* עיצוב תיבות העריכה של ה-AI */
      .ai-section-box {
        background: var(--bg-body);
        padding: 1.5rem;
        border-radius: var(--border-radius-md);
        border: 1px solid var(--border-color);
        margin-bottom: 1.5rem;
      }
      .ai-textarea {
        width: 100%;
        min-height: 180px;
        padding: 1rem;
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-md);
        background: var(--input-bg);
        color: var(--text-main);
        font-family: inherit;
        font-size: 0.95rem;
        line-height: 1.7;
        resize: vertical;
        transition: var(--transition);
        margin-top: 0.5rem;
      }
      .ai-textarea:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
      }

      /* מודל מחיקה */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .modal-overlay.open {
        display: flex;
        opacity: 1;
      }
      .modal-content {
        background: var(--bg-card);
        padding: 2rem;
        border-radius: var(--border-radius-lg);
        box-shadow: var(--shadow-md);
        max-width: 400px;
        width: 90%;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="icon-box"><i data-lucide="wand-2"></i></div>
        <div>
          <h2 style="margin: 0; font-size: 1.2rem">GenieSite</h2>
          <span style="font-size: 0.8rem; color: var(--text-muted)"
            >ניהול לקוחות</span
          >
        </div>
      </div>
      <ul class="client-list" id="clientList"></ul>
    </aside>

    <main class="dashboard-main">
      <header class="topbar">
        <h1 id="topbarTitle" style="margin: 0; font-size: 1.4rem">לוח בקרה</h1>
        <div style="display: flex; align-items: center; gap: 1.5rem">
          <span style="font-weight: 500; color: var(--text-muted)"
            >שלום, מני Bazov</span
          >
          <button
            id="themeToggleAdmin"
            type="button"
            style="
              background: var(--bg-body);
              border: 1px solid var(--border-color);
              color: var(--text-main);
              padding: 0.5rem 1rem;
              border-radius: var(--border-radius-md);
              display: flex;
              align-items: center;
              gap: 0.5rem;
              cursor: pointer;
              font-weight: 500;
              transition: var(--transition);
              box-shadow: var(--shadow-sm);
            "
          >
            <i
              data-lucide="moon"
              id="themeIcon"
              style="width: 18px; height: 18px"
            ></i>
            מצב תצוגה
          </button>
        </div>
      </header>

      <div class="content-area">
        <div
          id="welcomeState"
          class="empty-state"
          style="margin-top: 15vh; text-align: center"
        >
          <div
            style="
              background: var(--border-color);
              padding: 1.5rem;
              border-radius: 50%;
              color: var(--text-muted);
              display: inline-block;
              margin-bottom: 1rem;
            "
          >
            <i
              data-lucide="layout-template"
              style="width: 48px; height: 48px"
            ></i>
          </div>
          <h2>ברוך הבא למערכת הניהול</h2>
          <p>
            בחר לקוח מהתפריט בצד כדי לצפות באפיון וליצור עבורו תוכן אוטומטי.
          </p>
        </div>

        <div id="rawPanel" class="data-panel" style="display: none">
          <div
            class="panel-header"
            style="font-size: 1.2rem; color: var(--primary)"
          >
            <i data-lucide="file-text"></i> אפיון הלקוח במלואו
          </div>
          <div class="panel-body" id="clientRawData"></div>
        </div>

        <div id="aiPanel" class="data-panel" style="display: none">
          <div
            class="panel-header"
            style="
              font-size: 1.2rem;
              color: #eab308;
              display: flex;
              justify-content: space-between;
            "
          >
            <span style="display: flex; align-items: center; gap: 0.5rem"
              ><i data-lucide="sparkles"></i> תוצר AI ועריכה</span
            >
          </div>
          <div
            class="ai-tabs-container"
            id="aiTabs"
            style="display: none"
          ></div>
          <div
            class="panel-body"
            id="aiContentDisplay"
            style="padding: 1.5rem"
          ></div>
        </div>
      </div>
    </main>

    <div class="modal-overlay" id="deleteModal">
      <div class="modal-content">
        <div
          style="
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            color: var(--danger);
          "
        >
          <i data-lucide="alert-triangle" style="width: 48px; height: 48px"></i>
        </div>
        <h3 style="color: var(--danger)">מחיקת לקוח לצמיתות</h3>
        <p>האם למחוק את <strong id="modalClientName"></strong> מהמערכת?</p>
        <div
          class="modal-actions"
          style="
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
          "
        >
          <button class="btn btn-outline" onclick="closeDeleteModal()">
            ביטול
          </button>
          <button
            class="btn btn-primary"
            style="background: var(--danger)"
            id="confirmDeleteBtn"
          >
            כן, מחק!
          </button>
        </div>
      </div>
    </div>

    <script src="adminScript.js"></script>
    <script>
      lucide.createIcons();
      const themeToggle = document.getElementById("themeToggleAdmin");
      const htmlElement = document.documentElement;
      const themeIcon = document.getElementById("themeIcon");
      const savedTheme = localStorage.getItem("genieTheme") || "light";
      htmlElement.setAttribute("data-theme", savedTheme);
      themeIcon.setAttribute(
        "data-lucide",
        savedTheme === "dark" ? "sun" : "moon",
      );
      lucide.createIcons();

      themeToggle.addEventListener("click", () => {
        const newTheme =
          htmlElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        htmlElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("genieTheme", newTheme);
        themeIcon.setAttribute(
          "data-lucide",
          newTheme === "dark" ? "sun" : "moon",
        );
        lucide.createIcons();
      });
    </script>
  </body>
</html>
