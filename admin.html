<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenieSite Admin | לוח בקרה</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        margin: 0;
        display: flex;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
      }

      /* Sidebar */
      .sidebar {
        width: 300px;
        background: #ffffff;
        border-left: 1px solid #e5e7eb;
        display: flex;
        flex-direction: column;
        height: 100%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        z-index: 10;
      }
      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid #e5e7eb;
        text-align: center;
        background: #111827;
        color: white;
      }
      .sidebar-header h2 {
        margin: 0;
        font-size: 1.2rem;
      }
      .client-list {
        flex: 1;
        overflow-y: auto;
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .client-item {
        padding: 15px 20px;
        border-bottom: 1px solid #e5e7eb;
        cursor: pointer;
        transition: 0.2s ease;
      }
      .client-item:hover {
        background: #f8fafc;
      }
      .client-item.active {
        background: #ebf5ff;
        border-right: 4px solid #2563eb;
      }
      .client-name {
        font-weight: bold;
        color: #111827;
        display: block;
        margin-bottom: 4px;
      }
      .client-date {
        font-size: 0.8rem;
        color: #6b7280;
      }

      /* Main Content */
      .main-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .topbar {
        padding: 20px 30px;
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
      }
      .topbar h1 {
        margin: 0;
        font-size: 1.5rem;
        color: #111827;
      }

      .content-area {
        padding: 30px;
        overflow-y: auto;
        flex: 1;
      }

      /* Split View */
      .split-view {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        height: 100%;
      }
      .data-panel {
        background: #ffffff;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        display: flex;
        flex-direction: column;
      }
      .panel-header {
        padding: 15px 20px;
        border-bottom: 1px solid #e5e7eb;
        background: #f8fafc;
        font-weight: bold;
        border-radius: 12px 12px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .panel-body {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
        font-size: 0.95rem;
        line-height: 1.6;
      }
      .panel-body h3 {
        margin-top: 0;
        color: #2563eb;
        font-size: 1.1rem;
        margin-bottom: 10px;
      }

      .action-btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      .action-btn:hover {
        background: #1d4ed8;
      }

      .empty-state {
        text-align: center;
        color: #6b7280;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🪄 GenieSite Admin</h2>
      </div>
      <ul class="client-list" id="clientList">
        <li class="client-item">
          <span class="client-name">טוען לקוחות...</span>
        </li>
      </ul>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <h1 id="topbarTitle">בחר לקוח מהרשימה</h1>
      </header>

      <div class="content-area">
        <div class="split-view" id="splitView" style="display: none">
          <div class="data-panel">
            <div class="panel-header">
              <span>📝 נתוני מקור (מהלקוח)</span>
            </div>
            <div class="panel-body" id="clientRawData"></div>
          </div>

          <div class="data-panel">
            <div class="panel-header">
              <span>✨ יצירת תוכן (AI)</span>
              <button class="action-btn" onclick="generateAIContent()">
                🤖 צור תוכן עכשיו
              </button>
            </div>
            <div class="panel-body" id="aiContentArea">
              <p class="empty-state">
                לחץ על הכפתור למעלה כדי לשלוח את הנתונים ל-AI ולייצר תוכן
                אוטומטי לאתר.
              </p>
            </div>
          </div>
        </div>

        <div id="welcomeState" class="empty-state" style="margin-top: 20vh">
          <h2>ברוך הבא למערכת הניהול של GenieSite</h2>
          <p>בחר לקוח מהתפריט בצד כדי לצפות בפרטים שלו וליצור עבורו תוכן.</p>
        </div>
      </div>
    </main>

    <script>
      let clientsData = [];

      // פונקציה למשיכת הלקוחות מהשרת
      async function fetchClients() {
        try {
          const res = await fetch("/api/clients");
          const data = await res.json();
          if (data.success) {
            clientsData = data.clients;
            renderClientList();
          }
        } catch (err) {
          console.error("Error fetching clients:", err);
          document.getElementById("clientList").innerHTML =
            '<li class="client-item">שגיאה בטעינת הנתונים</li>';
        }
      }

      // רינדור רשימת הלקוחות בתפריט הצד
      function renderClientList() {
        const listEl = document.getElementById("clientList");
        listEl.innerHTML = "";

        if (clientsData.length === 0) {
          listEl.innerHTML = '<li class="client-item">אין לקוחות עדיין</li>';
          return;
        }

        clientsData.forEach((client, index) => {
          const date = new Date(client.createdAt).toLocaleDateString("he-IL", {
            hour: "2-digit",
            minute: "2-digit",
          });
          const businessName =
            client.data?.general?.businessName || "עסק ללא שם";

          const li = document.createElement("li");
          li.className = "client-item";
          li.innerHTML = `
            <span class="client-name">${businessName}</span>
            <span class="client-date">${date}</span>
          `;
          li.onclick = () => selectClient(index, li);
          listEl.appendChild(li);
        });
      }

      // בחירת לקוח והצגת הנתונים שלו
      function selectClient(index, liElement) {
        // סימון הלקוח כפעיל בתפריט
        document
          .querySelectorAll(".client-item")
          .forEach((el) => el.classList.remove("active"));
        liElement.classList.add("active");

        const client = clientsData[index].data;

        // החלפת תצוגה
        document.getElementById("welcomeState").style.display = "none";
        document.getElementById("splitView").style.display = "grid";
        document.getElementById("topbarTitle").innerText =
          client.general?.businessName || "פרטי לקוח";

        // הזרקת הנתונים למסך
        const rawDataEl = document.getElementById("clientRawData");
        rawDataEl.innerHTML = `
          <h3>פרטים כלליים</h3>
          <p><strong>דומיין:</strong> ${client.general?.domain || "לא הוזן"}</p>
          <p><strong>סלוגן:</strong> ${client.general?.slogan || "לא הוזן"}</p>
          <hr style="border:0; border-top:1px solid #e5e7eb; margin:15px 0;">
          
          <h3>על העסק</h3>
          <p>${client.business?.businessDescription || "לא הוזן"}</p>
          <p><strong>קהל יעד:</strong> ${client.business?.targetAudience || "לא הוזן"}</p>
          <hr style="border:0; border-top:1px solid #e5e7eb; margin:15px 0;">
          
          <h3>עמודים מבוקשים</h3>
          <p>${client.pages?.selected?.join(", ") || "לא נבחרו עמודים"}</p>
        `;

        // איפוס אזור ה-AI
        document.getElementById("aiContentArea").innerHTML =
          '<p class="empty-state">לחץ על הכפתור למעלה כדי לשלוח את הנתונים ל-AI ולייצר תוכן אוטומטי לאתר.</p>';
      }

      function generateAIContent() {
        alert(
          "כאן אנחנו נחבר בקרוב את ה-API של המודל AI שלך (Gemini / Claude / OpenAI) שיקרא את הנתונים שמשמאל וייצר תוכן אוטומטי!",
        );
      }

      // הפעלה ראשונית
      fetchClients();
    </script>
  </body>
</html>
